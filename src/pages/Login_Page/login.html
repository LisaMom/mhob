<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Mhob</title>
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="shortcut icon" href="../../assets/logo.png" type="image/x-icon"/>
    
    <meta name="description" content="ស្វែងយល់អំពីម្ហូបខ្មែរប្រពៃណី រស់ជាតិពិតប្រាកដ និងរូបមន្តដែលបានបន្តពីជំនាន់មួយទៅជំនាន់មួយ។"/>
    <meta name="keywords" content="ម្ហូបខ្មែរ, អាហារខ្មែរ, រូបមន្តខ្មែរ, Khmer food, Cambodian cuisine"/>
    <meta name="author" content="ម្ហូបខ្មែរ" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mhob Khmer" />
    <meta property="og:description" content="ស្វែងយល់អំពីម្ហូបខ្មែរប្រពៃណី រស់ជាតិពិតប្រាកដ និងរូបមន្តដែលបានបន្តពីជំនាន់មួយទៅជំនាន់មួយ។"/>
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="../../assets/image.png" />
    <meta property="og:image:alt" content="Traditional Khmer food with fresh ingredients served in banana leaf" />
    <meta property="og:locale" content="km_KH" />
    
    <style>
      body {
        min-height: 100vh;
        display: flex;
        overflow: hidden;
      }

      .auth-left {
        width: 42%;
        background: var(--green-main);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 36px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .auth-left::before,
      .auth-left::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
        background: white;
      }
      .auth-left::before {
        width: 300px;
        height: 300px;
        top: -80px;
        right: -80px;
      }
      .auth-left::after {
        width: 200px;
        height: 200px;
        bottom: -60px;
        left: -60px;
      }

      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 2;
      }
      .auth-logo img {
        height: 100px;
        object-fit: contain;
      }

      .auth-food-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 78%;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
        z-index: 2;
      }
      .auth-food-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
      }
      .auth-food-info {
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .auth-food-name {
        font-size: 1.125rem;
        color: white;
        font-weight: 700;
      }
      .auth-food-sub {
        font-size: 1.125rem;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 2px;
      }
      .auth-food-score {
        background: var(--gold);
        color: white;
        font-size: 1.125rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 8px;
      }
      .auth-quote {
        position: relative;
        z-index: 2;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .auth-quote p {
        font-size: 1.125rem;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.7;
        font-style: italic;
      }
      .auth-quote span {
        display: block;
        font-size: 1.125rem;
        color: var(--gold);
        margin-top: 6px;
      }

      .auth-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 48px;
        overflow-y: auto;
      }
      .auth-form-box {
        width: 100%;
        max-width: 400px;
      }

      .auth-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .auth-brand-dot {
        width: 10px;
        height: 10px;
        background: var(--green-main);
        border-radius: 50%;
      }
      .auth-brand-name {
        font-size: 1.5rem;
        font-weight: bolder;
        color: var(--green-main);
      }

      .auth-title {
        font-family: "Suwannaphum", serif;
        font-size:​2rem;
        font-weight: bolder;
        color: var(--text-dark);
        line-height: 1.3;
        margin-bottom: 6px;
      }
      .auth-subtitle {
        font-size: 1.125rem;
        color: var(--text-light);
        margin-bottom: 18px;
      }
      .auth-subtitle a {
        color: var(--green-main);
        font-weight: 600;
        text-decoration: none;
      }
      .auth-subtitle a:hover {
        text-decoration: underline;
      }

      .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        background: white;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--text-dark);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-social:hover {
        border-color: var(--green-main);
        background: var(--green-light);
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 14px 0;
        color: var(--text-light);
        font-size: 1.125rem;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e8e8e8;
      }

      /* Form fields */
      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 5px;
      }
      .form-group label span {
        font-weight: 400;
        color: var(--text-light);
        font-size: 1.125rem;
        margin-left: 4px;
      }
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 12px;
        color: #aaa;
        font-size: 1.125rem;
        display: flex;
        align-items: center;
        pointer-events: none;
      }
      .input-wrap input {
        width: 100%;
        padding: 11px 12px 11px 36px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        color: var(--text-dark);
        background: #fafafa;
        outline: none;
        transition: all 0.2s;
        box-sizing: border-box;
      }
      .input-wrap input:focus {
        border-color: var(--green-main);
        background: white;
        box-shadow: 0 0 0 3px rgba(61, 122, 53, 0.1);
      }
      .input-wrap input::placeholder {
        color: #bbb;
      }
      .eye-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: #aaa;
        font-size: 1.125rem;
        display: flex;
        align-items: center;
        padding: 0;
      }
      .eye-btn:hover {
        color: var(--green-main);
      }

      .form-row-check {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .form-check {
        display: flex;
        align-items: center;
        gap: 7px;
        cursor: pointer;
      }
      .form-check input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: var(--green-main);
        cursor: pointer;
      }
      .form-check span {
        font-size: 1.125rem;
        color: var(--text-medium);
      }
      .forgot-link {
        font-size: 1.125rem;
        color: var(--gold);
        font-weight: 600;
        text-decoration: none;
      }
      .forgot-link:hover {
        text-decoration: underline;
      }

      /* submit — same pattern as .food-card-btn but full width */
      .btn-submit {
        width: 100%;
        padding: 12px;
        background: var(--green-main);
        color: white;
        border: none;
        border-radius: 10px;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-submit:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(45, 90, 39, 0.3);
      }
      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .auth-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 1.125rem;
        margin-bottom: 14px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .auth-error.show {
        display: flex;
      }

      .auth-bottom {
        margin-top: 20px;
        text-align: center;
        font-size: 1.125rem;
        color: var(--text-light);
      }
      .auth-bottom a {
        color: var(--text-medium);
        text-decoration: none;
        margin: 0 6px;
      }
      .auth-bottom a:hover {
        color: var(--green-main);
      }

      /* Tablet 768–1024px: shrink left panel */
      @media (max-width: 1024px) {
        .auth-left {
          width: 38%;
          padding: 28px;
        }
        .auth-right {
          padding: 24px 32px;
        }
        .auth-food-card img {
          height: 180px;
        }
      }
      label {
  color: red; /* Sets the text color to blue */
  font-size: 1.1rem; /* Increases the font size */
  margin-bottom: 5px; /* Adds space below the label */
  display: block; /* Makes each label start on a new line */
}


      /* Mobile ≤768px: stack vertically, show logo on top */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
          overflow-y: auto;
        }

        /* Left panel becomes a compact header strip */
        .auth-left {
          width: 100%;
          flex-direction: row;
          align-items: center;
          padding: 16px 20px;
          min-height: auto;
          justify-content: flex-start;
          gap: 12px;
        }

        /* Hide food card + quote on mobile — keep logo only */
        .auth-food-card,
        .auth-quote {
          display: none;
        }
        .auth-left::before,
        .auth-left::after {
          display: none;
        }

        /* Logo row on mobile */
        .auth-logo {
          z-index: auto;
        }
        .auth-logo img {
          height: 60px;
        }

        /* Right panel takes full remaining height */
        .auth-right {
          padding: 28px 24px 40px;
          align-items: flex-start;
        }
        .auth-title {
          font-size: 1.75rem;
        }
      }

      /* Small phone ≤420px */
      @media (max-width: 420px) {
        .auth-right {
          padding: 22px 18px 36px;
        }
        .form-row-check {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
      }
         label::after {
  content: " *"; /* Adds a space and an asterisk after the label text */
  color: red; /* Styles the asterisk in red */
  margin-left: 0.2em; /* Adds a small gap */
}
    </style>
  </head>
  <body>
    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="auth-logo">
        <a href="/"
          ><img
            src="/src/assets/logo.png"
            alt="ម្ហូប"
            onerror="this.style.display = 'none'"
        /></a>
      </div>

      <div class="auth-food-card">
        <img
          src="https://i.pinimg.com/1200x/b1/61/26/b16126b63e2efa0dfc10be46bfaea99b.jpg"
          alt="ម្ហូបខ្មែរ"
        />
        <div class="auth-food-info">
          <div>
            <div class="auth-food-name">ម្ហូបប្រពៃណីខ្មែរ</div>
            <div class="auth-food-sub">រូបមន្ត​ ៥០០ - ប្រភេទ ១២០</div>
          </div>
          <div class="auth-food-score">8.9/10</div>
        </div>
      </div>

      <div class="auth-quote">
        <p>" ម្ហូបប្រពៃណីខ្មែរ​ មិនមែនគ្រាន់តែជាអាហារ តែជាមរតតរបស់ខ្មែរ "</p>
        <span>រូបមន្ត​ ៥០០ - ប្រភេទ ១២០</span>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-box">
        <div class="auth-brand">
          <div class="auth-brand-dot"></div>
          <span class="auth-brand-name">ម្ហូប</span>
        </div>

        <h1 class="auth-title">សូមស្វាគមន៍ការត្រឡប់មកវិញ</h1>

        <div class="auth-divider">ចូលតាមអ៊ីម៉ែលវិញ</div>

        <div class="auth-error" id="login-error">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="login-error-msg"></span>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label style="font-size: 18px">អ៊ីម៉ែល</label>
            <div class="input-wrap">
              <span class="input-icon"
                ><i class="fa-regular fa-envelope"></i
              ></span>
              <input
                type="email"
                id="email"
                placeholder="example@gmail.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label style="font-size: 18px">ពាក្យសម្ងាត់</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input
                type="password"
                id="password"
                placeholder="ពាក្យសម្ងាត់"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="eye-btn"
                onclick="togglePw('password', this)"
              >
                <i class="fa-regular fa-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <div class="form-row-check">
            <label class="form-check">
              <input type="checkbox" id="remember" />
              <span>រក្សាទុកចូល</span>
            </label>
            <a href="#" class="forgot-link">
              <i class="fa-solid fa-key" style="font-size: 1.125rem"></i>
              ភ្លេចពាក្យសម្ងាត់?
            </a>
          </div>

          <button type="submit" id="login-btn" class="btn-submit">
            <i class="fa-solid fa-right-to-bracket"></i> ចូលគណនី
          </button>
        </form>

        <p class="auth-subtitle" style="text-align: center; margin-top: 16px">
          មិនទាន់មានគណនី ?
          <a href="register.html"
            >
            បង្កើតគណនីថ្មី</a
          >
        </p>

        <div class="auth-bottom">
          <a href="#"
            ><i class="fa-regular fa-file-lines" style="font-size: 1.125rem"></i>
            លក្ខខណ្ឌ</a
          >
          ·
          <a href="#"
            ><i
              class="fa-solid fa-shield-halved"
              style="font-size: 1.125rem"
            ></i>
            គោលការណ៍ឯកជនភាព</a
          >
          ·
          <a href="#"
            ><i
              class="fa-regular fa-circle-question"
              style="font-size: 1.125rem"
            ></i>
            ជំនួយ</a
          >
        </div>
      </div>
    </div>

    <script src="/src/services/api.js"></script>
    <script>
      if (Auth.isLoggedIn()) window.location.href = "/index.html";

      function togglePw(id, btn) {
        const input = document.getElementById(id);
        const icon = document.getElementById("eye-icon");
        input.type = input.type === "password" ? "text" : "password";
        icon.className =
          input.type === "text"
            ? "fa-regular fa-eye-slash"
            : "fa-regular fa-eye";
        btn.style.color = input.type === "text" ? "var(--green-main)" : "#aaa";
      }

      function showError(msg) {
        document.getElementById("login-error-msg").textContent = msg;
        document.getElementById("login-error").classList.add("show");
      }
      function hideError() {
        document.getElementById("login-error").classList.remove("show");
      }

      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          hideError();
          const btn = document.getElementById("login-btn");
          btn.disabled = true;
          btn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> កំពុងចូល…';
          try {
            const data = await AuthAPI.login({
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            });
            Auth.setToken(data.access_token);
            Auth.setUser(data.user);
            showToast("សូមស្វាគមន៍! " + data.user.full_name, "success");
            setTimeout(() => (window.location.href = "/index.html"), 1000);
          } catch (err) {
            showError(err.message || "អ៊ីម៉ែល ឬ ពាក្យសម្ងាត់មិនត្រូវ");
            btn.disabled = false;
            btn.innerHTML =
              '<i class="fa-solid fa-right-to-bracket"></i> ចូលគណនី';
          }
        });
    </script>
  </body>
</html>
