    <style>
      body {
        min-height: 100vh;
        display: flex;
        overflow: hidden;
      }

      .auth-left {
        width: 42%;
        background: var(--green-main);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 36px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .auth-left::before,
      .auth-left::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
        background: white;
      }
      .auth-left::before {
        width: 300px;
        height: 300px;
        top: -80px;
        right: -80px;
      }
      .auth-left::after {
        width: 200px;
        height: 200px;
        bottom: -60px;
        left: -60px;
      }

      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 2;
      }
      .auth-logo img {
        height: 100px;
      }

      .auth-food-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 78%;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
        z-index: 2;
      }
      .auth-food-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
      }
      .auth-food-info {
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .auth-food-name {
        font-size: 1.125rem;
        color: white;
        font-weight: 700;
      }
      .auth-food-sub {
        font-size: 1.125rem;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 2px;
      }
      .auth-food-score {
        background: var(--gold);
        color: white;
        font-size: 1.125rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 8px;
      }

      .auth-quote {
        position: relative;
        z-index: 2;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .auth-quote p {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.7;
        font-style: italic;
      }
      .auth-quote span {
        display: block;
        font-size: 1.125rem;
        color: var(--gold);
        margin-top: 6px;
      }

      .auth-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 48px;
        overflow-y: auto;
      }
      .auth-form-box {
        width: 100%;
        max-width: 400px;
      }

      .auth-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .auth-brand-dot {
        width: 10px;
        height: 10px;
        background: var(--green-main);
        border-radius: 50%;
      }
      .auth-brand-name {
        font-size: 1.5rem;
        font-weight: bolder;
        color: var(--green-main);
      }

      .auth-title {
        font-family: "Suwannaphum", serif;
        font-size: 1.75rem;
        font-weight: 900;
        color: var(--text-dark);
        line-height: 1.3;
        margin-bottom: 6px;
      }
      .auth-subtitle {
        font-size: 1.125rem;
        color: var(--text-light);
        margin-bottom: 18px;
      }
      .auth-subtitle a {
        color: var(--green-main);
        font-weight: 600;
        text-decoration: none;
      }
      .auth-subtitle a:hover {
        text-decoration: underline;
      }

      .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        background: white;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--text-dark);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-social:hover {
        border-color: var(--green-main);
        background: var(--green-light);
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 14px 0;
        color: var(--text-light);
        font-size: 1.125rem;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e8e8e8;
      }

      /* Form */
      .form-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .form-group {
        margin-bottom: 13px;
      }
      .form-group label {
        display: block;
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 5px;
      }
      .form-group label span {
        font-weight: 400;
        color: var(--text-light);
        font-size: 1.125rem;
        margin-left: 4px;
      }
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 12px;
        color: #aaa;
        font-size: 1.125rem;
        display: flex;
        align-items: center;
        pointer-events: none;
      }
      .input-wrap input {
        width: 100%;
        padding: 10px 12px 10px 36px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        color: var(--text-dark);
        background: #fafafa;
        outline: none;
        transition: all 0.2s;
        box-sizing: border-box;
      }
      .input-wrap input:focus {
        border-color: var(--green-main);
        background: white;
        box-shadow: 0 0 0 3px rgba(61, 122, 53, 0.1);
      }
      .input-wrap input::placeholder {
        color: #bbb;
      }
      .eye-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: #aaa;
        font-size: 1.125rem;
        display: flex;
        align-items: center;
        padding: 0;
      }
      .eye-btn:hover {
        color: var(--green-main);
      }

      /* Password strength */
      .pw-strength {
        margin-top: 6px;
        display: flex;
        gap: 4px;
      }
      .pw-bar {
        height: 3px;
        flex: 1;
        border-radius: 2px;
        background: #e8e8e8;
        transition: background 0.3s;
      }
      .pw-bar.weak {
        background: #ef4444;
      }
      .pw-bar.medium {
        background: var(--gold);
      }
      .pw-bar.strong {
        background: var(--green-main);
      }

      /* Terms */
      .terms-check {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 18px;
        cursor: pointer;
      }
      .terms-check input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: var(--green-main);
        cursor: pointer;
        margin-top: 2px;
        flex-shrink: 0;
      }
      .terms-check span {
        font-size: 1.125rem;
        color: var(--text-medium);
        line-height: 1.5;
      }
      .terms-check a {
        color: var(--green-main);
        font-weight: 600;
        text-decoration: none;
      }

      /* Submit */
      .btn-submit {
        width: 100%;
        padding: 12px;
        background: var(--green-main);
        color: white;
        border: none;
        border-radius: 10px;
        font-family: "Suwannaphum", serif;
        font-size: 1.125rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-submit:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(45, 90, 39, 0.3);
      }
      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* Messages */
      .auth-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 1.125rem;
        margin-bottom: 12px;
        display: none;
      }
      .auth-error.show {
        display: block;
      }
      .auth-success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #16a34a;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 1.125rem;
        margin-bottom: 12px;
        display: none;
      }
      .auth-success.show {
        display: block;
      }

      .auth-bottom {
        margin-top: 16px;
        text-align: center;
        font-size: 1.125rem;
        color: var(--text-light);
      }
      .auth-bottom a {
        color: var(--text-medium);
        text-decoration: none;
        margin: 0 6px;
      }
      .auth-bottom a:hover {
        color: var(--green-main);
      }

      /* Tablet */
      @media (max-width: 1024px) {
        .auth-left {
          width: 38%;
          padding: 28px;
        }
        .auth-right {
          padding: 24px 32px;
        }
        .auth-food-card img {
          height: 180px;
        }
      }

      /* Mobile: stack — show logo as header strip */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
          overflow-y: auto;
        }

        .auth-left {
          width: 100%;
          flex-direction: row;
          align-items: center;
          padding: 14px 20px;
          min-height: auto;
          justify-content: flex-start;
          gap: 12px;
        }
        .auth-food-card,
        .auth-quote {
          display: none;
        }
        .auth-left::before,
        .auth-left::after {
          display: none;
        }

        .auth-logo img {
          height: 60px;
        }

        .auth-right {
          padding: 24px 22px 40px;
          align-items: flex-start;
        }
        .auth-title {
          font-size: 1.75rem;
        }
        .form-row-2 {
          grid-template-columns: 1fr;
          gap: 0;
        }
      }

      @media screen and (max-width: 420px) {
        .auth-left,
        .dark .auth-left {
          display: none !important;
        }
      }
      label::after {
  content: " *"; /* Adds a space and an asterisk after the label text */
  color: red; /* Styles the asterisk in red */
  margin-left: 0.2em; /* Adds a small gap */
}

    </style>
  </head>
  <body>
    <div class="auth-left">
      <div class="auth-logo">
        <a href="/"
          ><img
            src="/src/assets/logo.png"
            alt="ម្ហូប"
            onerror="this.style.display = 'none'"
        /></a>
      </div>

      <div class="auth-food-card">
        <img
          src="https://i.pinimg.com/1200x/b1/61/26/b16126b63e2efa0dfc10be46bfaea99b.jpg"
          alt="ម្ហូបខ្មែរ"
        />
        <div class="auth-food-info">
          <div>
            <div class="auth-food-name">ម្ហូបប្រពៃណីខ្មែរ</div>
            <div class="auth-food-sub">រូបមន្ត​ ៥០០ - ប្រភេទ ១២០</div>
          </div>
          <div class="auth-food-score">9.2/10</div>
        </div>
      </div>

      <div class="auth-quote">
        <p>" ម្ហូបប្រពៃណីខ្មែរ​ មិនមែនគ្រាន់តែជាអាហារ តែជាមរតតរបស់ខ្មែរ "</p>
        <span>រូបមន្ត​ ៥០០ - ប្រភេទ ១២០</span>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-box">
        <div class="auth-brand">
          <div class="auth-brand-dot"></div>
          <span class="auth-brand-name">ម្ហូប</span>
        </div>

        <h1 class="auth-title">បង្កើតគណនី</h1>

        <div class="auth-divider">ឬបង្កើតតាមអ៊ីម៉ែល</div>

        <div class="auth-error" id="reg-error"></div>
        <div class="auth-success" id="reg-success"></div>

        <form id="register-form">
          <div class="form-row-2">
            <div class="form-group">
              <label style="font-size: 18px">ឈ្មោះពេញ</label>
              <div class="input-wrap">
                <span class="input-icon"
                  ><i class="fa-regular fa-user"></i
                ></span>
                <input
                  type="text"
                  id="full_name"
                  placeholder="ឈ្មោះពេញ"
                  required
                  autocomplete="name"
                />
              </div>
            </div>
            <div class="form-group">
              <label style="font-size: 18px">ឈ្មោះប្រើ</label>
              <div class="input-wrap">
                <span class="input-icon"><i class="fa-solid fa-at"></i></span>
                <input
                  type="text"
                  id="username"
                  placeholder="mnak123"
                  required
                  autocomplete="username"
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label style="font-size: 18px">អ៊ីម៉ែល</label>
            <div class="input-wrap">
              <span class="input-icon"
                ><i class="fa-regular fa-envelope"></i
              ></span>
              <input
                type="email"
                id="email"
                placeholder="example@gmail.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label style="font-size: 18px">ពាក្យសម្ងាត់</label>
            <div class="input-wrap">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input
                type="password"
                id="password"
                placeholder="យ៉ាងហោចណាស់ ៨តួ"
                required
                minlength="8"
                oninput="checkStrength(this.value)"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="eye-btn"
                id="eye-btn"
                onclick="togglePw('password', this)"
              >
                <i class="fa-regular fa-eye" id="eye-icon"></i>
              </button>
            </div>
            <div class="pw-strength">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
          </div>

          <label class="terms-check">
            <input type="checkbox" id="terms" required />
            <span>
              ខ្ញុំយល់ព្រមនឹង
              <a href="#">លក្ខខណ្ឌប្រើប្រាស់</a>
              និង <a href="#">គោលការណ៍ឯកជនភាព</a>
              របស់ម្ហូប
            </span>
          </label>

          <button type="submit" id="reg-btn" class="btn-submit">
            <i class="fa-solid fa-user-plus"></i> បង្កើតគណនី
          </button>
        </form>

        <p class="auth-subtitle" style="text-align: center; margin-top: 14px">
          មានគណនីហើយ ? <a href="login.html">ចូលគណនី</a>
        </p>

        <div class="auth-bottom">
          <a href="#">លក្ខខណ្ឌ</a> · <a href="#">គោលការណ៍ឯកជនភាព</a> ·
          <a href="#">ជំនួយ</a>
        </div>
      </div>
    </div>

    <script src="/src/services/api.js"></script>
    <script>
      if (Auth.isLoggedIn()) window.location.href = "/index.html";

      function togglePw(id, btn) {
        const input = document.getElementById(id);
        const icon = document.getElementById("eye-icon");
        input.type = input.type === "password" ? "text" : "password";
        icon.className =
          input.type === "text"
            ? "fa-regular fa-eye-slash"
            : "fa-regular fa-eye";
        btn.style.color = input.type === "text" ? "var(--green-main)" : "#aaa";
      }

      function checkStrength(val) {
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const cls = score <= 1 ? "weak" : score <= 3 ? "medium" : "strong";
        ["bar1", "bar2", "bar3", "bar4"].forEach((id, i) => {
          document.getElementById(id).className =
            "pw-bar " + (i < score ? cls : "");
        });
      }

      function showError(msg) {
        const el = document.getElementById("reg-error");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("reg-success").classList.remove("show");
      }
      function showSuccess(msg) {
        const el = document.getElementById("reg-success");
        el.textContent = msg;
        el.classList.add("show");
        document.getElementById("reg-error").classList.remove("show");
      }

      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          if (!document.getElementById("terms").checked) {
            showError("សូមយល់ព្រមនឹងលក្ខខណ្ឌប្រើប្រាស់");
            return;
          }
          const btn = document.getElementById("reg-btn");
          btn.disabled = true;
          btn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> កំពុងបង្កើត…';
          try {
            await AuthAPI.register({
              full_name: document.getElementById("full_name").value.trim(),
              username: document.getElementById("username").value.trim(),
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            });
            showSuccess("គណនីត្រូវបានបង្កើតដោយជោគជ័យ! កំពុងទៅទំព័រចូល…");
            showToast("គណនីត្រូវបានបង្កើតដោយជោគជ័យ!", "success");
            setTimeout(() => (window.location.href = "login.html"), 1500);
          } catch (err) {
            showError(err.message || "មានបញ្ហា សូមព្យាយាមម្ដងទៀត");
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> បង្កើតគណនី';
          }
        });
    </script>
  </body>
</html>
